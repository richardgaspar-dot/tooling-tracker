 --paper:#E9EDF2;--card:#fff;--ink:#0E1A38;--soft:#5A6377;--hair:#DEE4EC;--hair2:#BFC8D6;
 --accent:#2E63B0;--accent-deep:#214B89;--accent-soft:#E5EDF9;
 --inhouse:#16294F;--topav:#276E7B;--feza:#A66A24;--field:#3F5B7C;--indauto:#556B57;--dcm:#6E5164;
 --done:#2F7D46;--active:#2E63B0;--risk:#BE8226;--blocked:#A5352A;--idle:#98A0A8;--stock:#297567;--transit:#6E4A96;--flip:#3F5B7C;

*{box-sizing:border-box;}
html,body{margin:0;background:var(--paper);color:var(--ink);font-family:"Inter",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;font-size:13px;}
.mono{font-family:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;}
h1,h2,.disp{font-family:"Space Grotesk","Inter",system-ui,sans-serif;}
input,select,textarea{font-family:inherit;font-size:12px;color:var(--ink);}
/* top bars */
.tzbar{display:flex;flex-wrap:wrap;gap:0;background:var(--ink);color:#fff;padding:0;position:sticky;top:0;z-index:30;border-bottom:2px solid var(--accent);}
.tz{padding:6px 13px;border-right:1px solid #ffffff14;display:flex;flex-direction:column;min-width:106px;}
.tz .l{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:#9aa6b3;font-weight:600;}
.tz .t{font-family:"IBM Plex Mono",ui-monospace,Menlo,monospace;font-size:14px;font-weight:600;margin-top:2px;letter-spacing:.02em;}
.tz .d{font-size:9px;color:#7d8996;}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:#fff;border-bottom:1px solid var(--hair2);padding:9px 16px;position:sticky;top:0;z-index:20;}
.brand{display:flex;align-items:center;gap:11px;margin-right:6px;padding-right:13px;border-right:1px solid var(--hair);}
.logo{display:inline-block;background:var(--logo) center/contain no-repeat;}
.brand .logo{width:112px;height:31px;}
.brand .logo2{width:104px;height:31px;background:var(--aviapool) center/contain no-repeat;}
.branddiv{width:1px;height:22px;background:var(--hair);flex:none;}
.brand .bt{line-height:1.15;border-left:1px solid var(--hair);padding-left:11px;}
.brand .bt b{font-family:"Space Grotesk",sans-serif;font-size:11px;font-weight:700;letter-spacing:.02em;display:block;color:var(--ink);}
.brand .bt span{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:600;}
.btn{font-size:11px;font-weight:600;padding:6px 11px;border:1px solid var(--hair2);border-radius:6px;background:#fff;cursor:pointer;color:var(--ink);transition:background .12s,border-color .12s;}
.btn:hover{background:var(--paper);border-color:var(--soft);}
.btn.pri{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn.pri:hover{background:var(--accent-deep);border-color:var(--accent-deep);}
.saved{font-size:11px;color:var(--done);margin-left:auto;opacity:0;transition:opacity .2s;font-weight:600;}
.saved.on{opacity:1;}
.warn{background:var(--accent-soft);color:var(--accent-deep);border:1px solid #e6b6a6;padding:8px 14px;font-size:12px;}
.wrap{max-width:1340px;margin:0 auto;padding:18px 20px 70px;}
.eyebrow{font-size:10.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);font-weight:600;}
h1{font-size:30px;line-height:1;margin:8px 0 0;letter-spacing:-.02em;font-weight:700;}
h1 .sub{display:block;font-size:13px;font-weight:500;color:var(--soft);letter-spacing:0;margin-top:8px;font-family:"Inter",sans-serif;}
.rule{height:2px;background:var(--ink);margin:14px 0 16px;position:relative;}
.rule::before{content:"";position:absolute;left:0;top:0;height:2px;width:64px;background:var(--accent);}
/* dossier frame — blueprint corner ticks: the signature device */
.frame{position:relative;border:1px solid var(--hair2);background:var(--card);padding:22px 24px;}
.frame .ct{position:absolute;width:12px;height:12px;pointer-events:none;}
.frame .ct::before,.frame .ct::after{content:"";position:absolute;background:var(--accent);}
.frame .ct::before{width:12px;height:2px;top:0;left:0;}
.frame .ct::after{width:2px;height:12px;top:0;left:0;}
.frame .ct.tl{top:-1px;left:-1px;}
.frame .ct.tr{top:-1px;right:-1px;transform:scaleX(-1);}

const DRAW="";

const SUPABASE_KEY="sb_publishable_SpJzInd5cRu475TEsh2-9A_DzS0WAuU";

const PROGRAM_CODE="P4628";
const LANEMETA={
 inhouse:{name:"MTD — In-House (Hayward, CA)",short:"MTD In-House",color:"#1B3A5B",tag:"Build"},
 aviapool:{name:"Aviapool · Exeter (UK)",short:"Aviapool (UK)",color:"#46578F",tag:"Consignment"},

const SUPCOLORS=["#6B5B95","#2F7D6B","#8C5A3C","#456B8C","#7A6A2E","#5C4A6B","#3D6E5A","#8A4A5E"];
function customSuppliers(){return (state&&state.suppliers)||[];}

function LM(k){
 if(LANEMETA[k])return LANEMETA[k];

const STATUSES=["Not started","In progress","At risk","Blocked","In stock","Complete"];
const STCLASS={"Not started":["b-idle","#9AA0A7"],"In progress":["b-active","#2E6FB0"],"At risk":["b-risk","#C9802B"],"Blocked":["b-blocked","#A33A2E"],"In stock":["b-stock","#2F7D6B"],"Complete":["b-done","#3F7D4E"]};

 const scope=document.getElementById('detail');if(!scope)return;

 {loc:"Hayward",tz:"America/Los_Angeles"},
 {loc:"Ada",tz:"America/New_York"},

 {loc:"Budapest",tz:"Europe/Budapest"},

];
const money=v=>v==null||v===''?'—':'$'+Number(v).toLocaleString('en-US',{maximumFractionDigits:0});
const money2=v=>v==null||v===''?'—':'$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const INSP_INHOUSE="Outside-machined parts (Xometry / SendCutSend / H2O) get incoming FAI against the Boeing drawing before they enter assembly. Attach the as-received photo; compare Boeing spec vs delivered part; log any deviation before it goes to final assembly.";
const INSP_FLIP="Incoming inspection: compare the Boeing-requested spec against the unit the vendor actually delivered. Attach the vendor drawing / photo above, record every dimension or feature that differs, and note any deviation that must be dispositioned before final acceptance.";
const RAGCOLOR={green:"#3F7D4E",amber:"#C9802B",red:"#A33A2E"};
// vivid variants used where the signal must read at a glance (left rail, status band)
const RAGSTRONG={green:"#0FA24B",amber:"#F2A013",red:"#E03127"};
function ragOf(t){
 if(t.rag&&t.rag!=='auto')return t.rag;
 if(t.status==='Complete'||t.status==='In stock')return 'green';
 const today=new Date().toISOString().slice(0,10);
 if(t.status==='Blocked')return 'red';
 if(t.finish&&t.status!=='Complete'&&t.finish<today)return 'red';
 if(t.status==='At risk')return 'amber';
 if(t.finish){const d=(new Date(t.finish)-new Date())/86400000;if(d<=14)return 'amber';}
 return 'green';
}
function addDays(iso,n){if(!iso)return"";const d=new Date(iso+"T00:00:00");d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function daysBetween(a,b){if(!a||!b)return null;return Math.round((new Date(b)-new Date(a))/86400000);}
function autogrow(el){el.style.height='auto';el.style.height=(el.scrollHeight+2)+'px';}
function growAll(scope){(scope||document).querySelectorAll('textarea').forEach(autogrow);}
function migrate(st){
 if(!st.suppliers||!st.suppliers.length)st.suppliers=JSON.parse(JSON.stringify(DEFAULT_SUPPLIERS));
 (st.tools||[]).forEach(t=>{
  if(t.rag==null)t.rag="auto";
  // BUILD/FLIP is the single source of truth; "MTD In-House" lane == in-house build
  if(t.inhouse==null)t.inhouse=(t.lane==='inhouse');
  if(t.lane==='inhouse')t.inhouse=true;
  if(t.inhouse){t.lane='inhouse';t.consignment=false;}
  else if(!t.lane||t.lane==='inhouse')t.lane=defaultLane();
  if(t.srcType==null)t.srcType=((supplierRec(t.lane)||{}).type)||'MFR';
  if(!t.log)t.log=[];
  if(t.consignment==null)t.consignment=!!(t.logistics&&/consignment/i.test(t.logistics.stage||''));
  if(t.inspection==null)t.inspection=t.inhouse?INSP_INHOUSE:INSP_FLIP;
  if(t.vendorDue==null)t.vendorDue=(!t.inhouse&&t.finish)?addDays(t.finish,-21):"";
  if(t.inspectTrip==null)t.inspectTrip="";
  if(t.ftzLoc==null)t.ftzLoc="";
  if(t.oaSent==null)t.oaSent=false;
  if(t.oaDate==null)t.oaDate="";
  if(t.loadTest==null)t.loadTest=false;
  if(t.calibration==null)t.calibration=false;
  if(t.bom){(t.bom.mfg||[]).forEach(function(r){if(r.proc==null)r.proc="";});(t.bom.hw||[]).forEach(function(r){if(r.proc==null)r.proc="";});}
  if(t.signal==null)t.signal="";
  if(!t.logDocs)t.logDocs=[];
  if(t.bom){['mfg','hw'].forEach(k=>{(t.bom[k]||[]).forEach(r=>{if(r.critical==null)r.critical=false;});});}
 });
 return st;
}

/* ---------- seed ---------- */
function mfgRow(fn,desc,qty,matl,src,srcn,unit,ext,paint,op,note,status,insp,critical){return{fn,desc,qty,matl,src,srcn,unit,ext,paint,op,note,status,insp,promised:"",proc:"",critical:!!critical};}
function seedBOM(){return {specs:[],mfg:[],hw:[]};}
function seedTools(){return [];}  // program data lives in Supabase only
function seedState(){return {tools:seedTools(),updated:new Date().toISOString()};}

/* ---------- storage ---------- */
let state=null, storageOK=true, _saveTimer=null, _saving=false, _dirty=false;
let _loadedRev=0, _fullOverwrite=false;
const _dirtyTools=new Set();     // tool ids I changed since last save → only these overwrite server
const _deletedTools=new Set();   // tool ids I deleted since last save
function markTool(id){ if(id) _dirtyTools.add(id); }
function flashSaved(txt){const el=document.getElementById('saved');if(!el)return;el.textContent=txt||'✓ Saved';el.classList.add('on');clearTimeout(window._st);window._st=setTimeout(()=>el.classList.remove('on'),1200);}
function storageWarn(msg){const el=document.getElementById('storewarn');if(el)el.innerHTML='<div class="warn">⚠ '+(msg||'Sync problem — check your connection.')+'</div>';}
async function loadState(){
 const {data,error}=await sb.from('programs').select('id,data').eq('code',PROGRAM_CODE).maybeSingle();
 if(error){storageWarn('Load failed: '+error.message);return null;}
 if(data && data.data && data.data.tools) return data.data;
 return null;
}
/* ---------- file storage (images / logistics docs live in the bucket, NOT in the JSON row) ---------- */
const BUCKET='p4628-files';
const _url={};                                  // path -> signed display URL (runtime cache)
async function signPath(path){
 try{const {data,error}=await sb.storage.from(BUCKET).createSignedUrl(path,604800);
   if(!error&&data&&data.signedUrl){_url[path]=data.signedUrl;return data.signedUrl;}}catch(e){}
 return null;
}
async function resolveFileURLs(){                // pre-sign every stored file once, on load
 const paths=[];
 (state.tools||[]).forEach(t=>{
   (t.images||[]).forEach(im=>{if(im&&im.path)paths.push(im.path);});
   (t.logDocs||[]).forEach(d=>{if(d&&d.path)paths.push(d.path);});
 });
 if(!paths.length)return;
 try{const {data}=await sb.storage.from(BUCKET).createSignedUrls(paths,604800);
   if(data)data.forEach(o=>{if(o&&o.signedUrl&&o.path)_url[o.path]=o.signedUrl;});}catch(e){}
}
function fileURL(o){return (o&&o.path&&_url[o.path]) || (o&&o.data) || '';}   // path first, base64 fallback (seed)
async function uploadToBucket(tid,prefix,blob,contentType,name){
 const safe=(name||'file').replace(/[^a-zA-Z0-9._-]/g,'_').slice(-48);
 const path=`tools/${tid}/${prefix}_${Date.now()}_${safe}`;
 const {error}=await sb.storage.from(BUCKET).upload(path,blob,{contentType:contentType||'application/octet-stream',upsert:true});
 if(error){storageWarn('Upload failed: '+error.message);return null;}
 await signPath(path);
 return path;
}
async function _doSave(){
 if(!state)return;
 if(_saving){_dirty=true;return;}          // a save is already running — mark dirty, run again after
 _saving=true; flashSaved('Saving…');
 try{
   // my in-memory state is AUTHORITATIVE → my own edits always persist
   let out=state;
   // only look at the server to avoid clobbering a *concurrent* editor
   let srv=null;
   try{const {data}=await sb.from('programs').select('data').eq('code',PROGRAM_CODE).maybeSingle(); srv=data&&data.data;}catch(e){}
   const conflict = !_fullOverwrite && srv && srv.tools && (srv.rev||0) > _loadedRev;
   if(conflict){
     // someone else saved since I loaded → keep MY edited tools, pull in their untouched changes
     const mineIdx={}; out.tools.forEach((t,i)=>mineIdx[t.id]=i);
     srv.tools.forEach(sv=>{
       if(_dirtyTools.has(sv.id)) return;                       // I changed this one → keep mine
       if(mineIdx[sv.id]!=null) out.tools[mineIdx[sv.id]]=sv;   // untouched by me → take their newer copy
       else out.tools.push(sv);                                 // brand-new tool from someone else → add
     });
     if(_deletedTools.size) out.tools=out.tools.filter(t=>!_deletedTools.has(t.id)); // my deletes stay deleted
   }
   out.updated=new Date().toISOString();
   out.rev=((srv&&srv.rev)||_loadedRev||0)+1;
   const {error}=await sb.from('programs').update({data:out}).eq('code',PROGRAM_CODE);
   if(error){storageWarn('Save failed: '+error.message);}
   else{
     state=out; _loadedRev=out.rev;
     _dirtyTools.clear(); _deletedTools.clear(); _fullOverwrite=false;
     flashSaved('✓ Saved');
     if(conflict) softRefresh();               // only re-render if we actually merged in others' changes
   }
 } finally {
   _saving=false;
   if(_dirty){_dirty=false;_doSave();}
 }
}
// re-render to reflect merged state, but never while the user is typing in a field
function softRefresh(){
 const ae=document.activeElement; if(ae&&/^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName)) return;
 const detail=document.getElementById('detail');
 if(detail && !detail.classList.contains('hide')){ if(current && tool(current)) renderDetail(current); else goSummary(); }
 else if(document.getElementById('summary')) renderSummary();
}
// pull the latest from the server on demand (or on a light idle timer) so open tabs stay in sync
async function refreshFromServer(){
 if(_saving || _dirtyTools.size || _deletedTools.size) return;   // don't clobber my own pending edits
 const ae=document.activeElement; if(ae&&/^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName)) return;
 const fresh=await loadState(); if(!fresh) return;
 if((fresh.rev||0)===_loadedRev) return;                          // nothing new
 state=fresh; _loadedRev=fresh.rev||0; migrate(state);
 await resolveFileURLs(); softRefresh();
}
// save() persists immediately (edits fire on blur, deletes/adds on click — none are spammy)
function save(){
 if(!state)return;
 state.updated=new Date().toISOString();
 clearTimeout(_saveTimer);
 _doSave();
}
// extra safety: flush when leaving/hiding the tab (only if there are unsaved edits, so we never clobber the freshest server copy)
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden'&&state&&(_dirtyTools.size||_deletedTools.size)){_doSave();}});
window.addEventListener('pagehide',()=>{if(state&&(_dirtyTools.size||_deletedTools.size)){try{_doSave();}catch(e){}}});
function tool(id){return state.tools.find(t=>t.id===id);}

/* ---------- live remaining ---------- */
function remain(dateStr){
 if(!dateStr) return {txt:"—",cls:"none"};
 const due=new Date(dateStr+"T17:00:00");
 const ms=due-new Date();
 const abs=Math.abs(ms);
 const d=Math.floor(abs/86400000), h=Math.floor(abs%86400000/3600000), m=Math.floor(abs%3600000/60000);
 const s=`${d}d ${h}h ${m}m`;
 if(ms<0) return {txt:"OVERDUE "+s,cls:"over"};
 if(d<=7) return {txt:s+" left",cls:"warn"};
 return {txt:s+" left",cls:"ok"};
}
function tickCountdowns(){
 document.querySelectorAll('[data-due]').forEach(e=>{
  const r=remain(e.dataset.due||"");
  e.textContent=r.txt; e.className="cd "+r.cls;
 });
}

const LW=262;

function laneVal(ln){const ts=state.tools.filter(t=>effLane(t)===ln);const u=ts.reduce((a,t)=>a+t.qty,0);return `${ts.length} ${ts.length===1?'tool':'tools'} · ${u}u`;}

   </div>
  </div>
  <div class="rule"></div>
  <div class="stats">
   <div class="stat"><div class="k">Tools</div><div class="v">${state.tools.length}</div></div>
   <div class="stat"><div class="k">Units</div><div class="v">${units}</div></div>

   <div class="stat"><div class="k">Schedule status</div><div class="v" style="font-size:15px">🟢${rg.green} 🟡${rg.amber} 🔴${rg.red}</div></div>

document.addEventListener('change',function(e){
 const t=e.target;if(!t.dataset||!t.dataset.tid)return;
 const T=tool(t.dataset.tid);if(!T)return;
 let val = t.type==='checkbox'?t.checked : t.value;
 if(t.classList.contains('num')||['qty','unit','ext'].includes(t.dataset.f)){ if(val!=='' && !isNaN(val)) val=Number(val); }
 if(t.dataset.bom!=null){ T.bom[t.dataset.bom][+t.dataset.i][t.dataset.f]=val; }
 else if(t.dataset.logi!=null){ if(!T.log)T.log=[]; T.log[+t.dataset.logi][t.dataset.lf]=val; }
 else if(t.dataset.log!=null){ T.logistics[t.dataset.log]=val; }
 else if(t.dataset.f==='buildtype'){
   const isBuild = (val==='build');
   T.inhouse=isBuild;
   if(isBuild){ T.lane='inhouse'; T.consignment=false; }
   else if(!T.lane||T.lane==='inhouse'){ T.lane=defaultLane(); }
   T.inspection = isBuild?INSP_INHOUSE:INSP_FLIP;
   if(!isBuild && !T.vendorDue && T.finish){ T.vendorDue=addDays(T.finish,-21); }
   markTool(T.id); save(); renderDetail(T.id); return;
 }
 else if(t.dataset.f==='lane' && val==='__new__'){ addSupplier(T.id); return; }
 else { T[t.dataset.f]=val; }
 // if a tool moves into a vendor/consignment category and has no vendor-due yet, seed one so the inspection window is usable
 if((t.dataset.f==='lane'||t.dataset.f==='consignment') && travelApplies(T) && !T.vendorDue && T.finish){ T.vendorDue=addDays(T.finish,-21); }
 markTool(T.id);
 save();
 // live updates for BOM edits (no full re-render, keeps focus)
 if(t.dataset.bom!=null){
   if(t.dataset.f==='ext') recalcTotals();
   if(t.dataset.f==='status'){ if(!document.getElementById('detail').classList.contains('hide')) renderDetail(current); }
 }
 // re-render affected view
 if(['pn','job','status','lane','srcType','qty','unit','start','finish','rag','consignment','inhouse','vendorDue','inspectTrip','loadTest','calibration','oaSent'].includes(t.dataset.f) && t.dataset.bom==null){ if(!document.getElementById('detail').classList.contains('hide')) renderDetail(current); }
});

function addLogDoc(tid,inp){const f=inp.files[0];if(!f)return;const T=tool(tid);if(!T.logDocs)T.logDocs=[];

function uploadBOM(tid,inp){
 const f=inp.files[0];if(!f)return;
 const rd=new FileReader();
 rd.onload=ev=>{
  try{
   const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
   let sn=wb.SheetNames.find(n=>/component sourcing/i.test(n))||wb.SheetNames.find(n=>/sourcing/i.test(n))||wb.SheetNames[0];
   const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:""});
   const parsed=parseSourcing(rows);
   const T=tool(tid);
   T.bom=T.bom||{specs:[]};T.bom.mfg=parsed.mfg;T.bom.hw=parsed.hw;if(!T.bom.specs)T.bom.specs=[];
   markTool(tid);save();renderDetail(tid);
   alert('Loaded '+parsed.mfg.length+' manufactured + '+parsed.hw.length+' hardware lines from "'+sn+'".');
  }catch(err){alert('Could not parse this workbook: '+err.message);}
 };
 rd.readAsArrayBuffer(f);
}
function parseSourcing(rows){
 // find header row (contains "Description" and "Sourcing")
 let hi=rows.findIndex(r=>r.some(c=>/description/i.test(c))&&r.some(c=>/sourcing/i.test(c)));
 if(hi<0)hi=rows.findIndex(r=>r.some(c=>/description/i.test(c)));
 const hdr=rows[hi]||[];
 const col=name=>hdr.findIndex(c=>new RegExp(name,'i').test(c));
 const ci={item:col('item'),desc:col('description'),qty:col('qty'),matl:col('material'),src:col('sourcing'),unit:col('unit'),ext:col('ext'),paint:col('paint'),op:col('outside'),note:col('note')};
 const mfg=[],hw=[];let section='mfg';
 for(let r=hi+1;r<rows.length;r++){
  const row=rows[r];const joined=row.join(' ');
  if(/purchased hardware/i.test(joined)){section='hw';continue;}
  if(/manufactured parts/i.test(joined)){section='mfg';continue;}
  if(/subtotal|grand total|^note/i.test(joined))continue;
  const desc=ci.desc>=0?row[ci.desc]:'';
  if(!desc||!String(desc).trim())continue;
  const srcn=ci.src>=0?String(row[ci.src]||''):'';
  const rec=mfgRow(
    ci.item>=0?row[ci.item]:'', desc, ci.qty>=0?row[ci.qty]:'', ci.matl>=0?row[ci.matl]:'',
    /in-house/i.test(srcn)?'inh':'out', srcn,
    ci.unit>=0?(row[ci.unit]||''):'', ci.ext>=0?(row[ci.ext]||''):'',
    ci.paint>=0?/y/i.test(String(row[ci.paint])):false, ci.op>=0?String(row[ci.op]||''):'',
    ci.note>=0?String(row[ci.note]||''):'', 'Not started', /in-house/i.test(srcn)?'na':'pend');
  (section==='mfg'?mfg:hw).push(rec);
 }
 return {mfg,hw};
}

function addImage(tid,inp){
 const f=inp.files[0];if(!f)return;
 const rd=new FileReader();
 rd.onload=ev=>{
  const img=new Image();
  img.onload=()=>{
   const max=1400;let{width:w,height:h}=img;if(w>max||h>max){const s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
   const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
   cv.toBlob(async(blob)=>{
     if(!blob){storageWarn('Could not process this image.');return;}
     flashSaved('Uploading…');
     const nm=(f.name||'photo').replace(/\.[^.]+$/,'')+'.jpg';
     const path=await uploadToBucket(tid,'img',blob,'image/jpeg',nm);
     if(!path)return;
     const T=tool(tid);if(!T.images)T.images=[];T.images.push({name:f.name||nm,type:'image/jpeg',path});
     markTool(tid);save();renderDetail(tid);
   },'image/jpeg',0.82);
  };
  img.src=ev.target.result;
 };
 rd.readAsDataURL(f);
}

 num=(num||'').trim(); if(!num) return '';
 const c=(carrier||'').toLowerCase(); const e=encodeURIComponent(num);
 if(/dhl/.test(c)) return 'https://www.dhl.com/en/express/tracking.html?AWB='+e;
 if(/fedex/.test(c)) return 'https://www.fedex.com/fedextrack/?trknbr='+e;
 if(/\bups\b/.test(c)) return 'https://www.ups.com/track?tracknum='+e;
 if(/usps/.test(c)) return 'https://tools.usps.com/go/TrackConfirmAction?tLabels='+e;
 if(/tnt/.test(c)) return 'https://www.tnt.com/express/en_us/site/tracking.html?searchType=CON&cons='+e;
 if(/dpd/.test(c)) return 'https://www.dpd.com/tracking?parcelNumber='+e;
 if(/gls/.test(c)) return 'https://gls-group.com/track?match='+e;
 if(/aramex/.test(c)) return 'https://www.aramex.com/track/results?ShipmentNumber='+e;
 // universal fallback — 17track auto-detects most carriers
 return 'https://t.17track.net/en#nums='+e;
}
function openTracking(tid){const t=tool(tid);const u=trackingURL(t.logistics&&t.logistics.carrier,t.logistics&&t.logistics.tracking);if(!u){alert('Enter a tracking number first (Tracking # field).');return;}window.open(u,'_blank','noopener');}
function copyTool(tid){
 const t=tool(tid);const lm=LM(effLane(t));
 let s=`${t.pn} — ${t.desc} (Job ${t.job})\nLane: ${lm.short} | Type: ${t.inhouse?'Build (in-house, MTD)':'Flip (supplier)'} | Status: ${t.status} | Qty ${t.qty}\nPO ${t.po||'—'} (${t.poDate||'—'}) | Start ${t.start||'—'} | Finish ${t.finish||'—'}${!t.inhouse?`\nLogistics: ${t.logistics.stage} | ${t.logistics.consignmentLoc||''} ${t.logistics.freight||''} ${t.logistics.customs||''} | ETA ${t.logistics.eta||'—'}${(t.logistics.tracking||t.logistics.carrier)?`\nTracking: ${(t.logistics.carrier||'')} ${(t.logistics.tracking||'')}`:''}`:''}\nEmirates: OA ${t.oaSent?('sent'+(t.oaDate?' '+t.oaDate:'')):'PENDING'} | Load test ${t.loadTest?'YES':'no'} | Calibration ${t.calibration?'YES':'no'} | ${(!t.loadTest&&!t.calibration)?'EARLY DELIVERY ELIGIBLE':'hold for testing'}${!t.inhouse&&t.logistics.notes?`\n${t.logistics.notes}`:''}`;
 if(travelApplies(t)){const g=daysBetween(t.vendorDue,t.finish);s+=`\nVendor due ${t.vendorDue||'—'} → Customer due ${t.finish||'—'}${g!=null?` (${g}d inspection window)`:''} | Inspect trip ${t.inspectTrip||'—'}`;}
 if(t.bom){s+=`\nBOM: ${t.bom.mfg.length} mfg + ${t.bom.hw.length} hw lines`;}
 if(t.log&&t.log.length){s+=`\n\nRecent log:\n`+t.log.slice(0,4).map(e=>`• ${e.date||''} [${e.type}] ${e.text||''}${e.nextAction?' → next: '+e.nextAction:''}`).join('\n');}
 navigator.clipboard.writeText(s).then(()=>alert('Copied tool status to clipboard.'),()=>prompt('Copy:',s));
}

/* ---------- share / export ---------- */
function exportJSON(){const b=new Blob([JSON.stringify(state,null,1)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='Emirates_777X_tracker_'+new Date().toISOString().slice(0,10)+'.json';a.click();}
function importJSON(inp){const f=inp.files[0];if(!f)return;const rd=new FileReader();rd.onload=e=>{try{state=migrate(JSON.parse(e.target.result));_fullOverwrite=true;_dirtyTools.clear();_deletedTools.clear();save();goSummary();alert('Imported.');}catch(x){alert('Bad file.');}};rd.readAsText(f);}
function shareLink(){
 // share the data (without images to keep the URL usable)
 const slim={tools:state.tools.map(t=>({...t,images:[]})),updated:state.updated};
 try{
  const enc=btoa(unescape(encodeURIComponent(JSON.stringify(slim))));
  const url=location.origin+location.pathname+'#d='+enc;
  navigator.clipboard.writeText(url).then(()=>alert('Shareable link copied (data without images). Anyone opening it loads this snapshot.\n\nTip: for images + real-time team sharing, this same UI can be wired to your Supabase backend.'),()=>prompt('Copy link:',url));
 }catch(e){alert('Link too large — use Export instead.');}
}
function loadFromHash(){if(location.hash.startsWith('#d=')){try{const j=JSON.parse(decodeURIComponent(escape(atob(location.hash.slice(3)))));if(j&&j.tools&&confirm('Load shared snapshot from link? (replaces current data)')){state=j;_fullOverwrite=true;_dirtyTools.clear();_deletedTools.clear();save();}}catch(e){}}}
function resetAll(){alert('Disabled in production. Restore from an exported JSON backup instead.');}

/* ---------- auth + boot ---------- */
function showLogin(){document.getElementById('login').style.display='flex';document.getElementById('appwrap').style.display='none';}
async function signInPassword(){
 const email=document.getElementById('loginEmail').value.trim();
 const password=document.getElementById('loginPass').value;
 const msg=document.getElementById('loginMsg');
 if(!email||!password){msg.textContent='Enter your email and password.';return;}
 const btn=document.getElementById('loginBtn');btn.disabled=true;btn.textContent='Signing in…';
 const {error}=await sb.auth.signInWithPassword({email,password});
 if(error){msg.textContent='Error: '+error.message;btn.disabled=false;btn.textContent='Sign in';}
 else{msg.textContent='✓ Signed in.';} // onAuthStateChange loads the app
}
async function sendMagic(){
 const email=document.getElementById('loginEmail').value.trim();
 const msg=document.getElementById('loginMsg');
 if(!email){msg.textContent='Enter your email first.';return;}
 const btn=document.getElementById('magicBtn');btn.disabled=true;btn.textContent='Sending…';
 const {error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:location.origin+location.pathname}});
 if(error){msg.textContent='Error: '+error.message;btn.disabled=false;btn.textContent='Or email me a magic link';}
 else{msg.textContent='✓ Check your email and click the link to sign in.';btn.textContent='Link sent';}
}
/* ---------- active users (Supabase Realtime Presence — no table needed) ---------- */
let ME=null, presence=null, _presSince=Date.now(), _lastActive=Date.now();
function markActive(){_lastActive=Date.now();}
function initPresence(user){
 if(!user)return; ME={email:user.email||'user',id:user.id}; _presSince=Date.now();
 try{
   presence=sb.channel('presence-'+PROGRAM_CODE,{config:{presence:{key:user.id||user.email}}});
   presence.on('presence',{event:'sync'},renderPresence);
   presence.on('presence',{event:'join'},renderPresence);
   presence.on('presence',{event:'leave'},renderPresence);
   presence.subscribe(async(status)=>{ if(status==='SUBSCRIBED'){ try{await presence.track({email:ME.email,since:_presSince,lastActive:_lastActive});}catch(e){} renderPresence(); } });
   ['click','keydown','mousemove','touchstart','scroll','focus'].forEach(ev=>window.addEventListener(ev,markActive,{passive:true}));
   setInterval(()=>{ if(presence){ try{presence.track({email:ME.email,since:_presSince,lastActive:_lastActive});}catch(e){} renderPresence(); } },15000);
 }catch(e){}
}
function renderPresence(){
 const el=document.getElementById('presence'); if(!el||!presence) return;
 let st={}; try{st=presence.presenceState();}catch(e){return;}
 const users={};
 Object.values(st).forEach(arr=>arr.forEach(p=>{const key=(p.email||'?').toLowerCase();const la=p.lastActive||0;if(!users[key]||la>users[key].lastActive)users[key]={email:p.email||'?',lastActive:la};}));
 const list=Object.values(users).sort((a,b)=>(a.email||'').localeCompare(b.email||''));
 if(!list.length){el.innerHTML='';return;}
 const now=Date.now();
 const chips=list.map(u=>{const active=(now-(u.lastActive||0))<90000;const isMe=ME&&u.email&&u.email.toLowerCase()===(ME.email||'').toLowerCase();const nm=(u.email||'?').split('@')[0];return `<span class="pchip ${active?'on':'idle'}" title="${esc(u.email)}${active?' · active now':' · idle (tab open)'}${isMe?' (you)':''}"><span class="pdot"></span>${esc(nm)}${isMe?' (you)':''}</span>`;}).join('');
 const activeCount=list.filter(u=>(now-(u.lastActive||0))<90000).length;
 el.innerHTML=`<span class="plabel">${list.length} online${activeCount<list.length?` · ${activeCount} active`:''}</span>`+chips;
}
async function signOut(){await sb.auth.signOut();location.reload();}
async function startApp(){
 document.getElementById('login').style.display='none';
 document.getElementById('appwrap').style.display='';
 renderTZ();
 state=await loadState();
 if(!state){state=seedState();migrate(state);_fullOverwrite=true;await sb.from('programs').update({data:state}).eq('code',PROGRAM_CODE);_fullOverwrite=false;}
 else{migrate(state);}
 _loadedRev=state.rev||0;
 await resolveFileURLs();
 renderSummary();
 setInterval(tickTZ,1000);tickTZ();
 setInterval(tickCountdowns,1000);tickCountdowns();
 setInterval(refreshFromServer,20000);          // keep open tabs in sync (only when idle & no pending edits)
 window.addEventListener('focus',()=>{refreshFromServer();});
 try{const u=(await sb.auth.getUser()).data.user;const w=document.getElementById('whoami');if(w&&u)w.textContent=u.email;if(u)initPresence(u);}catch(e){}
}
async function initAuth(){
 const {data:{session}}=await sb.auth.getSession();
 if(session){startApp();} else {showLogin();}
 sb.auth.onAuthStateChange((_e,s)=>{ if(s && !state){startApp();} });
}
initAuth();
